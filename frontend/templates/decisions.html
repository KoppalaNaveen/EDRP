{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Decision Management</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#decisionModal" onclick="openCreateModal()">
        <i class="bi bi-plus-circle me-1"></i> New Decision
    </button>
</div>

<div class="card shadow">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h5 class="mb-0 text-primary fw-bold">All Decisions</h5>
        <div class="input-group w-25">
            <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
            <input type="text" id="searchInput" class="form-control" placeholder="Search decisions...">
        </div>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th class="text-end pe-4">Actions</th>
                </tr>
            </thead>
            <tbody id="decisionsTableBody">
                <!-- Data populated by JS -->
            </tbody>
        </table>
    </div>
    <div class="card-footer bg-white py-3">
        <div class="d-flex justify-content-between align-items-center">
            <span id="paginationInfo" class="text-muted small">Showing 0 of 0</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-outline-secondary" id="btnPrev" onclick="prevPage()">Previous</button>
                <button class="btn btn-sm btn-outline-secondary" id="btnNext" onclick="nextPage()">Next</button>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="decisionModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold" id="modalTitle">Create Decision</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="decisionId">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Title</label>
                    <input type="text" id="decisionTitle" class="form-control" placeholder="Enter decision title">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea id="decisionDescription" class="form-control" rows="4" placeholder="Detail the context and background..."></textarea>
                </div>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveDecision()">Save Decision</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://127.0.0.1:8000";
    const USER_ID = parseInt("{{ session.get('user_id', 0) }}", 10);
</script>
<script src="{{ url_for('static', filename='js/decision.js') }}"></script>
{% endblock %}
