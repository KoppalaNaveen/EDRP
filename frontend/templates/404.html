<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
    </style>
</head>
<body>
    <div class="d-flex flex-column align-items-center justify-content-center" style="text-align: center;">
        <div style="color: #2563EB; margin-bottom: 20px;">
            <i data-lucide="alert-triangle" style="width: 100px; height: 100px;"></i>
        </div>
        <h1 style="font-size: 3rem; color: #0F172A; font-weight: 700; margin-bottom: 10px;">404 - Page Not Found</h1>
        <p style="font-size: 1.2rem; color: #475569; max-width: 600px; margin-bottom: 30px;">
            Oops! The page you are looking for does not exist or has been moved.
        </p>
        <div>
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary px-4 py-2" style="font-weight: 500; border-radius: 8px; display: inline-flex; align-items: center;">
                <i data-lucide="home" style="width: 18px; height: 18px; margin-right: 8px;"></i>
                Return to Dashboard
            </a>
        </div>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
