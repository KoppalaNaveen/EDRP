{% extends "base.html" %}

{% block css %}
<style>
.audit-row {
    border-bottom: 1px solid #F1F5F9;
    transition: background 0.15s;
}
.audit-row:hover { background: #F8FAFC; }
.severity-info     { background: #EEF2FF; color: #4F46E5; }
.severity-warning  { background: #FFF7ED; color: #D97706; }
.severity-critical { background: #FEF2F2; color: #DC2626; }
.severity-success  { background: #ECFDF5; color: #059669; }
.audit-icon-wrap {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.filter-bar { background: #F8FAFC; border-radius: 10px; padding: 12px 16px; border: 1px solid #E2E8F0; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold text-dark mb-1">Audit Logs</h2>
        <p class="text-muted mb-0">Full audit trail of all system events, changes, and user actions.</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-light border shadow-sm d-flex align-items-center gap-2" onclick="exportCSV()">
            <i data-lucide="download" style="width:15px;height:15px;"></i> Export CSV
        </button>
        <button class="btn btn-primary d-flex align-items-center gap-2" onclick="fetchAuditLogs()">
            <i data-lucide="refresh-cw" style="width:15px;height:15px;"></i> Refresh
        </button>
    </div>
</div>

<!-- Stats -->
<div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm rounded-3 p-3">
            <div class="d-flex align-items-center gap-3">
                <div style="width:40px;height:40px;border-radius:10px;background:#EEF2FF;display:flex;align-items:center;justify-content:center;">
                    <i data-lucide="activity" style="width:18px;height:18px;color:#4F46E5;"></i>
                </div>
                <div><div id="auditTotal" class="fw-bold fs-5 lh-1">—</div><div class="text-muted" style="font-size:11px;">Total Events</div></div>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm rounded-3 p-3">
            <div class="d-flex align-items-center gap-3">
                <div style="width:40px;height:40px;border-radius:10px;background:#ECFDF5;display:flex;align-items:center;justify-content:center;">
                    <i data-lucide="info" style="width:18px;height:18px;color:#059669;"></i>
                </div>
                <div><div id="auditInfo" class="fw-bold fs-5 lh-1">—</div><div class="text-muted" style="font-size:11px;">Info</div></div>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm rounded-3 p-3">
            <div class="d-flex align-items-center gap-3">
                <div style="width:40px;height:40px;border-radius:10px;background:#FFF7ED;display:flex;align-items:center;justify-content:center;">
                    <i data-lucide="alert-triangle" style="width:18px;height:18px;color:#D97706;"></i>
                </div>
                <div><div id="auditWarning" class="fw-bold fs-5 lh-1">—</div><div class="text-muted" style="font-size:11px;">Warnings</div></div>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm rounded-3 p-3">
            <div class="d-flex align-items-center gap-3">
                <div style="width:40px;height:40px;border-radius:10px;background:#FEF2F2;display:flex;align-items:center;justify-content:center;">
                    <i data-lucide="alert-octagon" style="width:18px;height:18px;color:#DC2626;"></i>
                </div>
                <div><div id="auditCritical" class="fw-bold fs-5 lh-1">—</div><div class="text-muted" style="font-size:11px;">Critical</div></div>
            </div>
        </div>
    </div>
</div>

<!-- Filter Bar -->
<div class="filter-bar d-flex gap-3 mb-4 align-items-center flex-wrap">
    <div class="input-group" style="width:240px;">
        <span class="input-group-text bg-white border-end-0">
            <i data-lucide="search" style="width:14px;height:14px;color:#94a3b8;"></i>
        </span>
        <input type="text" id="auditSearch" class="form-control border-start-0 ps-0" placeholder="Search logs..." oninput="filterAudit()">
    </div>
    <select id="severityFilter" class="form-select" style="width:150px;" onchange="filterAudit()">
        <option value="">All Severities</option>
        <option value="Info">Info</option>
        <option value="Warning">Warning</option>
        <option value="Critical">Critical</option>
        <option value="Success">Success</option>
    </select>
    <select id="moduleFilter" class="form-select" style="width:160px;" onchange="filterAudit()">
        <option value="">All Modules</option>
    </select>
</div>

<!-- Audit Table -->
<div class="card border-0 shadow-sm" style="border-radius:12px;overflow:hidden;">
    <div class="table-responsive">
        <table class="table align-middle mb-0" style="font-size:0.875rem;">
            <thead class="table-light text-secondary" style="font-size:0.72rem;text-transform:uppercase;">
                <tr>
                    <th class="px-4 py-3 border-bottom-0">Time</th>
                    <th class="px-4 py-3 border-bottom-0">User</th>
                    <th class="px-4 py-3 border-bottom-0">Action</th>
                    <th class="px-4 py-3 border-bottom-0">Module</th>
                    <th class="px-4 py-3 border-bottom-0">Severity</th>
                </tr>
            </thead>
            <tbody id="auditTableBody">
                <tr><td colspan="5" class="text-center py-5 text-muted">
                    <div class="spinner-border spinner-border-sm me-2"></div>Loading audit logs...
                </td></tr>
            </tbody>
        </table>
    </div>
    <div class="card-footer bg-white border-top py-3 px-4">
        <div class="d-flex justify-content-between align-items-center">
            <span id="auditPaginationInfo" class="text-muted small">Loading...</span>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-secondary px-3" id="auditBtnPrev" onclick="prevPage()" disabled>Previous</button>
                <button class="btn btn-sm btn-outline-secondary px-3" id="auditBtnNext" onclick="nextPage()" disabled>Next</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://127.0.0.1:8000";
</script>
<script src="{{ url_for('static', filename='js/audit.js') }}"></script>
{% endblock %}
