{% extends "base.html" %}

{% block content %}

<div class="login-container">

    <div class="login-card">

        <h2>Login</h2>

        <p>Sign in to Expert Decision Replay Platform</p>

        <form method="POST">

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required
                >

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required
                >

            </div>

            <button type="submit" class="btn btn-primary">
                Login
            </button>

        </form>

        <div class="register-link">

            <p>
                Don't have an account?
                <a href="{{ url_for('register') }}">
                    Register Here
                </a>
            </p>

        </div>

    </div>

</div>

{% endblock %}
