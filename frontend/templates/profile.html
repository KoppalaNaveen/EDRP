{% extends "base.html" %}

{% block content %}

<div class="container py-4">

    <div class="row">

        <div class="col-lg-4">

            <div class="card shadow border-0">

                <div class="card-body text-center">

                    <img

                        src="https://ui-avatars.com/api/?name={{ profile.full_name }}&background=0d6efd&color=fff&size=150"

                        class="rounded-circle mb-3"

                        width="150"

                    >

                    <h3>{{ profile.full_name }}</h3>

                    <p class="text-muted">

                        {{ profile.designation }}

                    </p>

                    <span class="badge bg-primary">

                        {{ profile.role }}

                    </span>

                    <span class="badge bg-success">

                        {{ profile.team }}

                    </span>

                </div>

            </div>

        </div>

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white">

                    <h5 class="mb-0">

                        Profile Information

                    </h5>

                </div>

                <div class="card-body">

                    <form

                        action="{{ url_for('update_profile') }}"

                        method="POST"

                    >

                        <div class="mb-3">

                            <label>

                                Full Name

                            </label>

                            <input

                                class="form-control"

                                name="full_name"

                                value="{{ profile.full_name }}"

                                required

                            >

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input

                                class="form-control"

                                value="{{ profile.email }}"

                                readonly

                            >

                        </div>

                        <div class="mb-3">

                            <label>Phone</label>

                            <input

                                class="form-control"

                                name="phone"

                                value="{{ profile.phone }}"

                            >

                        </div>

                        <div class="mb-3">

                            <label>Designation</label>

                            <input

                                class="form-control"

                                name="designation"

                                value="{{ profile.designation }}"

                            >

                        </div>

                        <button

                            class="btn btn-primary"

                            type="submit"

                        >

                            Update Profile

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/profile.js') }}"></script>

{% endblock %}
